spring:
  application:
    name: dashviagens

  datasource:
    url: jdbc:postgresql://localhost:5432/dashviagens
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: create
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /docs

dashviagens:
  jwt:
    secret: "CHANGE_ME_BASE64_SECRET_MIN_32_BYTES"
    expiration-minutes: 120
  external-apis:
    exchange-rate-base-url: https://api.frankfurter.dev
    rest-countries-base-url: https://restcountries.com/v3.1
